<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Apple MP3 Player - Classic LCD Edition</title>
    <style>
        :root {
            --ipod-bg: #e0e0e0;
            --screen-bg: #d1d1e0;
            --apple-blue: #3b97ee;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .ipod {
            width: 300px;
            height: 520px;
            background: linear-gradient(145deg, #f0f0f0, #c8c8c8);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 2px 5px white;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #aaa;
        }
        .screen {
            width: 100%;
            height: 230px;
            background: var(--screen-bg);
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
            color: #333;
            display: flex;
            flex-direction: column;
            border: 4px solid #222;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }
        .screen::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 50%);
            pointer-events: none;
        }
        .screen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            background: linear-gradient(to bottom, #f5f5f5, #b8b8c8);
            border-bottom: 1px solid #888;
            color: #444;
        }
        .battery {
            width: 18px;
            height: 8px;
            border: 1px solid #555;
            position: relative;
            background: white;
        }
        .battery::after {
            content: '';
            width: 12px;
            height: 6px;
            background: #4caf50;
            position: absolute;
            left: 1px; top: 1px;
        }
        .now-playing {
            flex: 1;
            padding: 15px 10px 5px 10px;
            display: flex;
            flex-direction: column;
        }
        .track-count {
            font-size: 11px;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        .track-info-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        /* BAGIAN YANG DIRUBAH */
        #album-art {
            width: 90px;
            height: 90px;
            background-color: #fff;
            border: 1px solid #777;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            
            /* Menambahkan gambar 123.jpg */
            background-image: url('foto1.jpg'); 
            background-size: cover;
            background-position: center;
            
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .playing #album-art {
            transform: scale(1.05);
        }
        .text-meta {
            display: flex;
            flex-direction: column;
            text-align: left;
            overflow: hidden;
        }
        #song-title {
            font-weight: 800;
            font-size: 14px;
            color: #000;
            margin-bottom: 2px;
            letter-spacing: -0.3px;
        }
        #artist-name { font-size: 12px; color: #444; opacity: 0.9; margin: 0; }
        .album-name { font-size: 12px; color: #555; margin-top: 2px; }
        .progress-container {
            margin-top: auto;
            padding-bottom: 8px;
        }
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e0e0f0;
            border: 1px solid #999;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(to bottom, #87ceeb, #3b97ee);
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: bold;
            margin-top: 4px;
            color: #333;
        }
        .wheel {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #ffffff 0%, #f0f0f0 100%);
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1), inset 0 2px 5px white;
            cursor: pointer;
        }
        .center-button {
            width: 65px;
            height: 65px;
            background: #f8f8f8;
            border-radius: 50%;
            border: 1px solid #ddd;
            z-index: 10;
            transition: transform 0.1s;
        }
        .center-button:active { transform: scale(0.92); }
        .wheel-label {
            position: absolute;
            font-weight: bold;
            color: #bbb;
            font-size: 11px;
            user-select: none;
        }
        .menu { top: 15px; }
        .next { right: 15px; }
        .prev { left: 15px; }
        .play-pause { bottom: 15px; }
    </style>
</head>
<body>
<div class="ipod">
    <div class="screen">
        <div class="screen-header">
            <span>▶Ⅱ</span>
            <span>16:01</span>
            <div class="battery"></div>
        </div>
        <div class="now-playing">
            <div class="track-count">1 of 100</div>
            
            <div class="track-info-container">
                <div id="album-art"></div>
                <div class="text-meta">
                    <div id="song-title">PT MENCARI CINTA</div>
                    <div id="artist-name">Artas Music</div>
                    <div class="album-name">Enjoy Life </div>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="time-info">
                    <span id="current-time">0:00</span>
                    <span id="duration-time">0:00</span>
                </div>
            </div>
        </div>
    </div>
    <div class="wheel" onclick="togglePlay()">
        <div class="wheel-label menu">MENU</div>
        <div class="wheel-label next">▶▶</div>
        <div class="wheel-label prev">◀◀</div>
        <div class="wheel-label play-pause">▶/Ⅱ</div>
        <div class="center-button"></div>
    </div>
</div>

<audio id="audio-player" src="Test.mp3"></audio>

<script>
    const audio = document.getElementById('audio-player');
    const songTitle = document.getElementById('song-title');
    const ipod = document.querySelector('.ipod');
    const progressFill = document.getElementById('progress-fill');
    const currentTimeEl = document.getElementById('current-time');
    const durationTimeEl = document.getElementById('duration-time');

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            ipod.classList.add('playing');
            songTitle.style.color = "#3b97ee";
        } else {
            audio.pause();
            ipod.classList.remove('playing');
            songTitle.style.color = "#000";
        }
    }

    function formatTime(seconds) {
        let mins = Math.floor(seconds / 60);
        let secs = Math.floor(seconds % 60);
        return mins + ":" + (secs < 10 ? '0' : '') + secs;
    }

    audio.ontimeupdate = function() {
        if (audio.duration) {
            const percentage = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = percentage + "%";
            
            currentTimeEl.innerText = formatTime(audio.currentTime);
            durationTimeEl.innerText = "-" + formatTime(audio.duration - audio.currentTime);
        }
    };

    audio.onloadedmetadata = function() {
        durationTimeEl.innerText = "-" + formatTime(audio.duration);
    };
</script>
</body>
</html>
