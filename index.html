<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Apple MP3 Player - Classic LCD Edition</title>
    <style>
        :root {
            --ipod-bg: #e0e0e0;
            --screen-bg: #d1d1e0;
            --apple-blue: #3b97ee;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .ipod {
            width: 300px;
            height: 520px;
            background: linear-gradient(145deg, #f0f0f0, #c8c8c8);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 2px 5px white;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #aaa;
        }
        .screen {
            width: 100%;
            height: 230px;
            background: var(--screen-bg);
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
            color: #333;
            display: flex;
            flex-direction: column;
            border: 4px solid #222;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }
        .screen::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 50%);
            pointer-events: none;
        }
        .screen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            background: linear-gradient(to bottom, #f5f5f5, #b8b8c8);
            border-bottom: 1px solid #888;
            color: #444;
        }
        .battery {
            width: 18px;
            height: 8px;
            border: 1px solid #555;
            position: relative;
            background: white;
        }
        .battery::after {
            content: '';
            width: 12px;
            height: 6px;
            background: #4caf50;
            position: absolute;
            left: 1px; top: 1px;
        }
        .now-playing {
            flex: 1;
            padding: 15px 10px 5px 10px;
            display: flex;
            flex-direction: column;
        }
        .track-count {
            font-size: 11px;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        .track-info-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        #album-art {
            width: 90px;
            height: 90px;
            background-color: #fff;
            border: 1px solid #777;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            background-image: url('fotojadul.jpg');
            background-size: cover;
            background-position: center;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .playing #album-art {
            transform: scale(1.05);
        }
        .text-meta {
            display: flex;
            flex-direction: column;
            text-align: left;
            overflow: hidden;
        }
        #song-title {
            font-weight: 800;
            font-size: 14px;
            color: #000;
            margin-bottom: 2px;
            letter-spacing: -0.3px;
        }
        #artist-name { font-size: 12px; color: #444; opacity: 0.9; margin: 0; }
        .album-name { font-size: 12px; color: #555; margin-top: 2px; }

        /* Playlist */
        #playlist {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            color: white;
            padding: 15px;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            z-index: 20;
        }
        .playlist-item {
            padding: 10px;
            border-bottom: 1px solid #555;
            cursor: pointer;
        }
        .playlist-item.active {
            background: var(--apple-blue);
            color: white;
        }

        .progress-container {
            margin-top: auto;
            padding-bottom: 8px;
        }
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e0e0f0;
            border: 1px solid #999;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(to bottom, #87ceeb, #3b97ee);
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: bold;
            margin-top: 4px;
            color: #333;
        }
        .wheel {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #ffffff 0%, #f0f0f0 100%);
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1), inset 0 2px 5px white;
            cursor: pointer;
        }
        .center-button {
            width: 65px;
            height: 65px;
            background: #f8f8f8;
            border-radius: 50%;
            border: 1px solid #ddd;
            z-index: 10;
            transition: transform 0.1s;
        }
        .center-button:active { transform: scale(0.92); }
        .wheel-label {
            position: absolute;
            font-weight: bold;
            color: #bbb;
            font-size: 11px;
            user-select: none;
        }
        .menu { top: 15px; }
        .next { right: 15px; }
        .prev { left: 15px; }
        .play-pause { bottom: 15px; }
    </style>
</head>
<body>
<div class="ipod">
    <div class="screen">
        <div class="screen-header">
            <span>▶Ⅱ</span>
            <span id="clock">16:01</span>
            <div class="battery"></div>
        </div>
        <div class="now-playing">
            <div class="track-count" id="track-count">1 of 5</div>
          
            <div class="track-info-container">
                <div id="album-art"></div>
                <div class="text-meta">
                    <div id="song-title">NO EXIT</div>
                    <div id="artist-name">PT MENCARI CINTA SEJATI</div>
                    <div class="album-name">TASIK PUNYA CERITA</div>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="time-info">
                    <span id="current-time">0:00</span>
                    <span id="duration-time">0:00</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Playlist -->
    <div id="playlist"></div>

    <div class="wheel">
        <div class="wheel-label menu" onclick="togglePlaylist()">MENU</div>
        <div class="wheel-label next" onclick="nextSong()">▶▶</div>
        <div class="wheel-label prev" onclick="prevSong()">◀◀</div>
        <div class="wheel-label play-pause" onclick="togglePlay()">▶/Ⅱ</div>
        <div class="center-button" onclick="togglePlay()"></div>
    </div>
</div>

<audio id="audio-player"></audio>

<script>
    let songs = [
        {
            title: "NO EXIT",
            artist: "PT MENCARI CINTA SEJATI",
            src: "noexit.mp3",
            cover: "fotojadul.jpg"
        },
        {
            title: "NEW SYCLON",
            artist: "PT MENCARI CINTA SEJATI",
            src: "newsyc.mp3",
            cover: "foto2.jpg"
        },
        {
            title: "Midnight Drive",
            artist: "Neon Nights",
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
            cover: "https://picsum.photos/id/201/300/300"
        },
        {
            title: "Summer Rain",
            artist: "Chill Vibes",
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
            cover: "https://picsum.photos/id/237/300/300"
        },
        {
            title: "Electric Dreams",
            artist: "Synthwave",
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
            cover: "https://picsum.photos/id/870/300/300"
        }
    ];

    let currentIndex = 0;

    const audio = document.getElementById('audio-player');
    const titleEl = document.getElementById('song-title');
    const artistEl = document.getElementById('artist-name');
    const albumArt = document.getElementById('album-art');
    const trackCount = document.getElementById('track-count');
    const progressFill = document.getElementById('progress-fill');
    const currentTimeEl = document.getElementById('current-time');
    const durationTimeEl = document.getElementById('duration-time');
    const clockEl = document.getElementById('clock');
    const playlistEl = document.getElementById('playlist');

    // ==================== JAM REAL TIME WIB ====================
    function updateWIBClock() {
        const now = new Date();
        const wibTime = new Date(now.getTime() + (7 * 60 * 60 * 1000));
        let hours = wibTime.getUTCHours();
        let minutes = wibTime.getUTCMinutes();
        clockEl.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
    }
    setInterval(updateWIBClock, 1000);
    updateWIBClock();

    // ==================== LOAD LAGU ====================
    function loadSong(index) {
        const song = songs[index];
        audio.src = song.src;
        titleEl.textContent = song.title;
        artistEl.textContent = song.artist;
        albumArt.style.backgroundImage = `url('${song.cover}')`;
        trackCount.textContent = `${index + 1} of ${songs.length}`;
        updateActivePlaylist();
    }

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            document.querySelector('.ipod').classList.add('playing');
        } else {
            audio.pause();
            document.querySelector('.ipod').classList.remove('playing');
        }
    }

    function nextSong() {
        currentIndex = (currentIndex + 1) % songs.length;
        loadSong(currentIndex);
        audio.play();
    }

    function prevSong() {
        currentIndex = (currentIndex - 1 + songs.length) % songs.length;
        loadSong(currentIndex);
        audio.play();
    }

    function togglePlaylist() {
        playlistEl.style.display = (playlistEl.style.display === 'flex') ? 'none' : 'flex';
    }

    function createPlaylist() {
        playlistEl.innerHTML = songs.map((song, i) => `
            <div class="playlist-item" onclick="playFromPlaylist(${i})">
                ${i+1}. ${song.title} - ${song.artist}
            </div>
        `).join('');
    }

    function playFromPlaylist(index) {
        currentIndex = index;
        loadSong(index);
        audio.play();
        togglePlaylist();
    }

    function updateActivePlaylist() {
        document.querySelectorAll('.playlist-item').forEach((el, i) => {
            el.classList.toggle('active', i === currentIndex);
        });
    }

    // Progress Bar
    audio.ontimeupdate = function() {
        if (audio.duration) {
            const percentage = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = percentage + "%";
            currentTimeEl.innerText = formatTime(audio.currentTime);
            durationTimeEl.innerText = "-" + formatTime(audio.duration - audio.currentTime);
        }
    };

    function formatTime(seconds) {
        let mins = Math.floor(seconds / 60);
        let secs = Math.floor(seconds % 60);
        return mins + ":" + (secs < 10 ? '0' : '') + secs;
    }

    audio.onloadedmetadata = function() {
        durationTimeEl.innerText = "-" + formatTime(audio.duration);
    };

    // Inisialisasi
    createPlaylist();
    loadSong(0);
</script>
</body>
</html>
